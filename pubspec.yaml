name: studio_ghibli_catalog
description: A Studio Ghibli catalog app for browsing films.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Localization
  easy_localization: ^3.0.7

  # Local persistence
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
